<html lang="en">
  <head>

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Google Search Console domain ownership verification (URL-prefix property).
         Required by OAuth brand verification to confirm we own this domain. -->

    <title>Dumpster</title>
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      /* Prevent iOS overscroll bounce */
      html, body { overscroll-behavior: none; background: #0a0a0a; }
      /* Prevent pull-to-refresh */
      body { overscroll-behavior-y: contain; }
      /* Prevent text size adjustment on iOS */
      body { -webkit-text-size-adjust: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!--
      Static fallback footer with Privacy/Terms links.
      Google's OAuth brand-verification crawler may scan the HTML before
      running JavaScript. Without these links in the static markup, the
      verification fails with "homepage doesn't link to your privacy policy".
      The React app footer also includes the same links; this is the belt
      under the suspenders.
    -->
    <noscript>
      <footer style="text-align:center;color:#666;font-size:12px;padding:24px;font-family:system-ui,sans-serif">
        Dumpster — Instagram carousel sequencing tool.
        <br><br>
        <a href="/privacy" style="color:#888;margin:0 8px">Privacy Policy</a>
        <a href="/terms" style="color:#888;margin:0 8px">Terms of Service</a>
        <a href="mailto:axiomonellc@outlook.com" style="color:#888;margin:0 8px">Contact</a>
      </footer>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
